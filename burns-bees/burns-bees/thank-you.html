<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent | Burns Bees</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600&family=Quicksand:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --cream: #fff8e7;
      --brown: #3e2723;
      --honey: #ffc93c;
      --orange: #ff9f1c;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 30px 20px;
      background: var(--cream);
      color: var(--brown);
      font-family: "Quicksand", sans-serif;
      text-align: center;
    }

    .thank-you-card {
      width: min(620px, 100%);
      padding: 58px 36px;
      background: var(--white);
      border: 2px solid var(--brown);
      border-radius: 28px;
      box-shadow: 8px 8px 0 var(--honey);
    }

    .bee {
      margin-bottom: 10px;
      font-size: 54px;
      line-height: 1;
    }

    h1 {
      margin: 0 0 18px;
      font-family: "Fraunces", serif;
      font-size: clamp(40px, 8vw, 64px);
      line-height: 1.05;
    }

    p {
      max-width: 480px;
      margin: 0 auto 32px;
      font-size: 18px;
      line-height: 1.7;
    }

    a {
      display: inline-block;
      padding: 15px 28px;
      border: 2px solid var(--brown);
      border-radius: 999px;
      background: var(--orange);
      color: var(--brown);
      box-shadow: 4px 5px 0 var(--brown);
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.15s ease;
    }

    a:hover,
    a:focus-visible {
      transform: translateY(-2px);
    }
  </style>
</head>

<body>
  <main class="thank-you-card">
    <div class="bee" aria-hidden="true">🐝</div>
    <h1>Thank you!</h1>
    <p>
      Your message has been sent to Burns Bees.
      We will get back to you as soon as possible.
    </p>
    <a href="/">Return to Burns Bees</a>
  </main>
</body>
</html>
